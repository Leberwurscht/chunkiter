stages:
  - build
  - deploy

build_docs:
  stage: build
  image: python:3.12
  script:
    - pip install -e . sphinx sphinx-rtd-theme
    - make -C docs html
    - mv docs/build/html public
  artifacts:
    paths:
      - public
  only:
    - master

pages:
  stage: deploy
  dependencies:
    - build_docs
  script:
    - echo "Deploying GitLab Pages"
  artifacts:
    paths:
      - public
  only:
    - master
